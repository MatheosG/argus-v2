# ============================================================
# ARGUS v2 — Configuration
# ============================================================

simulation:
  n_trials: 1000
  months: 132
  seed: 42

files:
  staffing: "inputs/staffing_final.csv"
  running_costs: "inputs/running_costs.csv"

compensation:
  benefits_base: 1.05
  benefits_quarterly_increase: 0.02

timeline:
  mvp_months: 6

economics:
  discount_rate:
    distribution: triangular
    params: { low: 0.20, mode: 0.30, high: 0.40 }

lca:
  diesel_gal_per_day_onshore: 2000
  diesel_gal_per_day_offshore: 8450
  co2_kg_per_gal: 10.18
  argus_npt_reduction: 0.03
  car_co2_per_year_mt: 4.6
  home_co2_per_year_mt: 7.94

rig_classes:

  On1:
    timeline:
      first_rig_month: 6
      last_rig_month: 60
    revenue:
      days_per_month: 30
      installation_fee: 10000
    market:
      total_rigs_added:
        distribution: triangular
        params: { low: 50, mode: 50, high: 50 }
      rigs_lost_per_year:
        distribution: triangular
        params: { low: 0, mode: 1, high: 3 }
      daily_rate:
        distribution: triangular
        params: { low: 500, mode: 500, high: 500 }
      utilization_rate:
        distribution: triangular
        params: { low: 0.27, mode: 0.44, high: 0.67 }

  off1:
    timeline:
      first_rig_month: 12
      last_rig_month: 60
    revenue:
      days_per_month: 30
      installation_fee: 20000
    market:
      total_rigs_added:
        distribution: triangular
        params: { low: 5, mode: 5, high: 70 }
      rigs_lost_per_year:
        distribution: triangular
        params: { low: 0, mode: 1, high: 3 }
      daily_rate:
        distribution: triangular
        params: { low: 1250, mode: 1250, high: 1250 }
      utilization_rate:
        distribution: triangular
        params: { low: 0.80, mode: 0.88, high: 0.95 }

